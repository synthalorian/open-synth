name: open_synth
description: "Open Synth — Software synthesizer with synthwave preset library"
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^6.3.3
  uuid: ^4.4.2
  ffi: ^2.1.3
  path_provider: ^2.1.5
  flutter_midi_command: ^0.5.4
  file_picker: ^8.0.7
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  test: ^1.30.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#240037"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
