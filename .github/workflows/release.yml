name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: .fvmrc

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release -t lib/main_prod.dart

      - name: Prepare release bundle
        run: |
          mkdir -p release
          cd build/linux/x64/release/bundle
          tar czf "../../../../../../release/open-synth-linux-x64.tar.gz" .

      - name: Upload Linux bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: release/open-synth-linux-x64.tar.gz

      - name: Compute version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package .deb
        run: |
          mkdir -p release/deb/open-synth/usr/bin
          mkdir -p release/deb/open-synth/usr/share/applications
          mkdir -p release/deb/open-synth/usr/share/icons/hicolor/256x256/apps
          mkdir -p release/deb/open-synth/DEBIAN
          cp -r build/linux/x64/release/bundle/* release/deb/open-synth/usr/bin/
          cp assets/icon.png release/deb/open-synth/usr/share/icons/hicolor/256x256/apps/com.synthalorian.open_synth.png
          cat > release/deb/open-synth/usr/share/applications/com.synthalorian.open_synth.desktop << 'EOF'
          [Desktop Entry]
          Name=Open Synth
          Comment=Software synthesizer with synthwave preset library
          Exec=/usr/bin/open_synth/open_synth
          Icon=com.synthalorian.open_synth
          Terminal=false
          Type=Application
          Categories=AudioVideo;Audio;
          EOF
          cat > release/deb/open-synth/DEBIAN/control <<EOF
          Package: open-synth
          Version: ${{ steps.version.outputs.version }}
          Section: sound
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, liblzma5
          Maintainer: Open Synth Team <hello@synthalorian.com>
          Description: Open Synth — Software synthesizer with synthwave preset library
           A modern software synthesizer built with Flutter and native DSP.
          EOF
          dpkg-deb --build release/deb/open-synth release/open-synth-linux-amd64.deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release/open-synth-linux-amd64.deb

      - name: Package AppImage
        run: |
          mkdir -p release/appimage/AppDir/usr/bin
          mkdir -p release/appimage/AppDir/usr/share/applications
          mkdir -p release/appimage/AppDir/usr/share/icons/hicolor/256x256/apps
          cp -r build/linux/x64/release/bundle/* release/appimage/AppDir/usr/bin/
          cp assets/icon.png release/appimage/AppDir/usr/share/icons/hicolor/256x256/apps/com.synthalorian.open_synth.png
          cat > release/appimage/AppDir/usr/share/applications/com.synthalorian.open_synth.desktop << 'EOF'
          [Desktop Entry]
          Name=Open Synth
          Comment=Software synthesizer with synthwave preset library
          Exec=open_synth
          Icon=com.synthalorian.open_synth
          Terminal=false
          Type=Application
          Categories=AudioVideo;Audio;
          EOF
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          # Extract and run because FUSE is unavailable on GitHub Actions runners
          ./linuxdeploy-x86_64.AppImage --appimage-extract >/dev/null
          ./squashfs-root/AppRun --appdir release/appimage/AppDir --output appimage
          mv *.AppImage release/open-synth-linux-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/open-synth-linux-x86_64.AppImage

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: .fvmrc

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=release.keystore\n' \
            "$KEYSTORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" > android/key.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release -t lib/main_prod.dart

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  release:
    needs: [build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux bundle
        uses: actions/download-artifact@v4
        with:
          name: linux-bundle
          path: release

      - name: Download Linux .deb
        uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: release

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release

      - name: Download AppImage
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: |
            release/open-synth-linux-x64.tar.gz
            release/open-synth-linux-amd64.deb
            release/open-synth-linux-x86_64.AppImage
            release/app-release.apk
          generate_release_notes: true
